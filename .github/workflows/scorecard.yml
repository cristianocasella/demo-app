name: OpenSSF Scorecard

on:
  # Run on branch protection rule changes
  branch_protection_rule:
  # Run weekly on Sundays
  schedule:
    - cron: '30 1 * * 0'
  # Run on push to main
  push:
    branches: [ main ]
  # Allow manual trigger
  workflow_dispatch:

# Declare permissions for GitHub token
permissions:
  # Needed to upload results to code-scanning dashboard
  security-events: write
  # Needed to publish results and get repository details
  id-token: write
  contents: read
  actions: read

jobs:
  analysis:
    name: OpenSSF Scorecard Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Run OpenSSF Scorecard
        uses: ossf/scorecard-action@v2.4.0
        with:
          results_file: results.sarif
          results_format: sarif
          # Publish results to OpenSSF REST API
          # Set to true to publish results (requires public repo)
          publish_results: true

      - name: Upload SARIF results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif

      - name: Upload results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 30

      - name: Display Scorecard summary
        if: always()
        run: |
          echo "📊 OpenSSF Scorecard Analysis Complete!"
          echo "View detailed results in the Security tab > Code scanning alerts"
