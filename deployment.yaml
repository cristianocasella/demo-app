apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-demo
  namespace: demo-workload
  labels:
    app: hello-demo
    app.kubernetes.io/name: hello-demo
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: demo-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hello-demo
  template:
    metadata:
      labels:
        app: hello-demo
        app.kubernetes.io/name: hello-demo
        app.kubernetes.io/component: frontend
        app.kubernetes.io/part-of: demo-app
    spec:
      containers:
      - name: hello
        image: nginxdemos/hello:latest
        ports:
        - containerPort: 80
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 3
          periodSeconds: 5
